name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # ⏰ 10분마다 자동으로 빌드가 돌아가도록 스케줄러 지정
  schedule:
    - cron: '*/10 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    # 1. 안드로이드 빌드에 필요한 자바 환경 세팅
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 2. ⚠️ 중요: GitHub Actions 가상 서버에 Android SDK 환경 구축
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 3. 빌드 스크립트 실행 권한 부여
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Release용 APK 빌드 진행
    - name: Build Release APK with Gradle
      run: ./gradlew assembleRelease

    # 5. 빌드된 APK 파일을 GitHub Actions 대시보드에 업로드
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release_b${{ github.run_number }}
        # 빌드 완료된 APK 파일 경로 (프로젝트 구조에 맞게 복사)
        path: |
          app/build/outputs/apk/release/*.apk
